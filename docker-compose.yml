services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  gatekeeper:
    build:
      context: .
      dockerfile: gatekeeper/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    group_add:
      - "967"
    environment:
      REDIS_URL: redis://redis:6379
      ORCH_PORT: 9000
    ports:
      - "9000:9000/udp"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:z,rw

  game_server:
    build:
      context: .
      dockerfile: game_server/Dockerfile

  spatial-server:
    build:
      context: .
      dockerfile: spatial-server/Dockerfile
    ports:
      - "50000:50000/udp"

volumes:
  redis-data:
    driver: local